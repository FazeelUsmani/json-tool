# On-demand Playwright suite. Not wired to push/PR — Playwright's
# ~150MB browser install + 3-5min run time would inflate the main CI
# gate uncomfortably. workflow_dispatch lets anyone trigger from the
# Actions UI (Run workflow → main); promote to on-PR when the suite is
# proven stable enough that flakes won't drown out real signal.
#
# Browser cache: keyed on package-lock.json so a dep bump
# (specifically a Playwright bump) cleanly invalidates. Saves 1-2
# minutes per non-bump run.

name: E2E (on-demand)

on:
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps for cached browser
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build (preview is what e2e runs against)
        run: npm run build

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
